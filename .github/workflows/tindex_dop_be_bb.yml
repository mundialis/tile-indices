name: Update DOP BE/BB Tile Index

on:
  push:
    branches:
    - main
  schedule:
    # run tile index creation every month (Min HH DD Month DayOfWeek)
    - cron:  '0 15 18 * *'

jobs:
  update-tindex-dop-nw:
    runs-on: ubuntu-latest
    env:
      CI_COMMIT_MESSAGE: Update BE/BB DOP tile index
    steps:
    - uses: actions/checkout@v7
    - name: Creation of tindex
      run: |
        sed -i "s|# federal state specific required apk installations, to be replaced within workflow yaml|RUN apk add --no-cache gcc musl-dev python3-dev g++ libffi-dev|g" docker/Dockerfile
        sed -i "s+# federal state specific required pip installations, to be replaced within workflow yaml+RUN pip3 install pandas geopandas shapely fiona+g" docker/Dockerfile
        sed -i "s+# federal state specific python script, to be replaced within workflow yaml+RUN python3 DOP/BE_BB/DOP_tileindex_BE_BB.py+g" docker/Dockerfile
        docker build -f docker/Dockerfile -t test-tindex .
        ID=$(docker create test-tindex)
        echo $ID
        docker cp $ID:/src/tile-indices/DOP/BE_BB/DOP20_tileindex_BE_BB.gpkg.gz DOP/BE_BB/
    # Commit and push all changed files.
    - name: Upload tindex
      # Only run on main branch push (e.g. after pull request merge).
      run: |
        ID=$(docker create test-tindex)
        echo ${ID}
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
        git config pull.rebase false
        git add DOP/NW/openNRW_DOP10_tileindex.gpkg.gz
        git commit -m "${{ env.CI_COMMIT_MESSAGE }}"
        git pull origin main
        git push
